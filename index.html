<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Humanizer - AI to Human Text Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #e055a3;
    --accent-glow: rgba(124, 106, 247, 0.18);
    --text: #e8e8f0;
    --muted: #6b6b88;
    --success: #2dd4a0;
    --error: #f05a5a;
    --warn: #f0b429;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(124,106,247,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 80%, rgba(224,85,163,0.09) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1180px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .badge span { font-size: 10px; }

  h1 {
    font-size: clamp(30px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 0%, #c4beff 50%, #e055a3 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 14px;
  }

  header p {
    font-size: 15px;
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* ── API Config Card ── */
  .config-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .api-row {
    display: flex;
    gap: 10px;
  }

  .api-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .api-row input::placeholder { color: var(--muted); }

  .api-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .hint {
    margin-top: 12px;
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.6;
  }

  .hint a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }

  .hint a:hover { text-decoration: underline; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 13px 22px;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, #9b88ff 100%);
    color: #fff;
    box-shadow: 0 4px 18px rgba(124,106,247,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(124,106,247,0.45);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-ghost {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover {
    background: var(--border);
    color: var(--text);
  }

  .btn-copy {
    background: linear-gradient(135deg, var(--success), #1ea880);
    color: #fff;
    box-shadow: 0 4px 14px rgba(45,212,160,0.25);
  }

  .btn-copy:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(45,212,160,0.4);
  }

  /* ── Main Grid ── */
  .editor-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    align-items: start;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  /* ── Panel ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .char-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 3px 10px;
    color: var(--muted);
  }

  textarea {
    width: 100%;
    min-height: 340px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.85;
    color: var(--text);
    resize: vertical;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  textarea::placeholder { color: var(--muted); }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  textarea[readonly] { cursor: default; }
  textarea[readonly]:focus { border-color: var(--success); box-shadow: 0 0 0 3px rgba(45,212,160,0.12); }

  .panel-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .panel-actions .btn { flex: 1; }

  /* ── Middle Arrow ── */
  .arrow-col {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    margin-top: 160px;
  }

  .arrow-icon {
    width: 40px;
    height: 40px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 18px;
  }

  /* ── Progress Bar ── */
  .progress-wrap {
    margin-top: 4px;
    display: none;
  }

  .progress-wrap.show { display: block; }

  .progress-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    width: 0%;
    transition: width 0.5s ease;
  }

  .progress-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  /* ── Status ── */
  .status-line {
    font-size: 12.5px;
    font-weight: 600;
    padding: 10px 14px;
    border-radius: 10px;
    display: none;
    font-family: 'DM Mono', monospace;
  }

  .status-line.show { display: block; }
  .status-line.working { background: rgba(240,180,41,0.12); color: var(--warn); border: 1px solid rgba(240,180,41,0.2); }
  .status-line.success { background: rgba(45,212,160,0.1); color: var(--success); border: 1px solid rgba(45,212,160,0.2); }
  .status-line.error   { background: rgba(240,90,90,0.1);  color: var(--error);   border: 1px solid rgba(240,90,90,0.2); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .pulsing { animation: pulse 1.2s infinite; }

  /* ── Responsive ── */
  @media (max-width: 860px) {
    .editor-grid {
      grid-template-columns: 1fr;
    }
    .arrow-col { display: none; }
    .wrapper { padding: 24px 16px 48px; }
  }
</style>
</head>
<body>

<div class="wrapper">


  <!-- No API needed notice -->
  <div class="config-card" style="border-color: var(--success); background: rgba(45,212,160,0.06);">
    <div class="card-label" style="color: var(--success);">✓ No API Key Required</div>
    <div class="hint" style="color: var(--text); font-size:13.5px;">
      This tool runs <strong>100% offline in your browser</strong> — no API key, no internet, no cost. Just paste your text and convert!
    </div>
  </div>

  <!-- Editor Grid -->
  <div class="editor-grid">

    <!-- Left: Input -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">📋 AI Text — Paste Here</div>
        <div class="char-pill"><span id="inCount">0</span> chars</div>
      </div>
      <textarea id="inputText" placeholder="Paste ChatGPT, Gemini, or any AI-generated text here..."></textarea>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-label" id="progressLabel">Starting...</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      </div>

      <div class="panel-actions">
        <button class="btn btn-primary" id="convertBtn" onclick="humanizeText()">✦ Convert (3-Pass)</button>
        <button class="btn btn-ghost" onclick="clearInput()">Clear</button>
      </div>
      <div id="inputStatus" class="status-line"></div>
    </div>

    <!-- Middle Arrow -->
    <div class="arrow-col">
      <div class="arrow-icon">→</div>
    </div>

    <!-- Right: Output -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">✅ Human Text — Copy Here</div>
        <div class="char-pill"><span id="outCount">0</span> chars</div>
      </div>
      <textarea id="outputText" placeholder="Your humanized result will appear here..." readonly></textarea>

      <div class="panel-actions">
        <button class="btn btn-copy" onclick="copyText()">⎘ Copy to Clipboard</button>
        <button class="btn btn-ghost" onclick="clearOutput()">Clear</button>
      </div>
      <div id="outputStatus" class="status-line"></div>
    </div>

  </div>
</div>

<script>
  const inputText    = document.getElementById('inputText');
  const outputText   = document.getElementById('outputText');
  const inputStatus  = document.getElementById('inputStatus');
  const outputStatus = document.getElementById('outputStatus');
  const convertBtn   = document.getElementById('convertBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressLabel= document.getElementById('progressLabel');

  inputText.addEventListener('input', () => {
    document.getElementById('inCount').textContent = inputText.value.length.toLocaleString();
  });

  function showStatus(el, msg, type) {
    el.textContent = msg;
    el.className = `status-line show ${type}`;
  }
  function hideStatus(el) { el.className = 'status-line'; }

  function setProgress(pct, label) {
    progressFill.style.width = pct + '%';
    progressLabel.textContent = label;
    progressWrap.className = 'progress-wrap show';
  }
  function hideProgress() {
    progressWrap.className = 'progress-wrap';
    progressFill.style.width = '0%';
  }

  // ── Pass 1: Replace AI phrases & formal words ──
  function pass1_replacePhrases(text) {
    const replacements = [
      [/\bfurthermore\b/gi, 'also'],
      [/\bmoreover\b/gi, 'on top of that'],
      [/\bin addition\b/gi, 'plus'],
      [/\bnevertheless\b/gi, 'still'],
      [/\bnotwithstanding\b/gi, 'even so'],
      [/\bsubsequently\b/gi, 'then'],
      [/\bconsequently\b/gi, 'so'],
      [/\bthus\b/gi, 'so'],
      [/\bhence\b/gi, 'so'],
      [/\butilize\b/gi, 'use'],
      [/\butilization\b/gi, 'use'],
      [/\bfacilitate\b/gi, 'help'],
      [/\bleverage\b/gi, 'use'],
      [/\bimplement\b/gi, 'use'],
      [/\bcommence\b/gi, 'start'],
      [/\bterminate\b/gi, 'end'],
      [/\bascertain\b/gi, 'find out'],
      [/\bdemonstrate\b/gi, 'show'],
      [/\bexhibit\b/gi, 'show'],
      [/\bpossess\b/gi, 'have'],
      [/\bobtain\b/gi, 'get'],
      [/\bpurchase\b/gi, 'buy'],
      [/\brequire\b/gi, 'need'],
      [/\bsignificant(ly)?\b/gi, (m, s) => s ? 'really' : 'big'],
      [/\bsignificant impact\b/gi, 'big effect'],
      [/\bplay a crucial role\b/gi, 'really matter'],
      [/\bwide range of\b/gi, 'lots of'],
      [/\ba variety of\b/gi, 'many'],
      [/\bin order to\b/gi, 'to'],
      [/\bas well as\b/gi, 'and'],
      [/\bsuch as\b/gi, 'like'],
      [/\bin conclusion\b/gi, "here's the thing"],
      [/\bto summarize\b/gi, 'basically'],
      [/\bin summary\b/gi, 'so'],
      [/\bit is important to note\b/gi, 'worth noting'],
      [/\bit is worth noting\b/gi, 'worth noting'],
      [/\bone must\b/gi, 'you should'],
      [/\bone can\b/gi, 'you can'],
      [/\bindividuals\b/gi, 'people'],
      [/\bchildren\b/gi, 'kids'],
      [/\bnumerous\b/gi, 'many'],
      [/\badditionally\b/gi, 'also'],
      [/\bprior to\b/gi, 'before'],
      [/\bsubsequent to\b/gi, 'after'],
      [/\bin the event that\b/gi, 'if'],
      [/\bdue to the fact that\b/gi, 'because'],
      [/\bfor the purpose of\b/gi, 'to'],
      [/\bat this point in time\b/gi, 'now'],
      [/\bin the near future\b/gi, 'soon'],
      [/\bkey factor\b/gi, 'big thing'],
      [/\boptimal\b/gi, 'best'],
      [/\bfundamental\b/gi, 'basic'],
      [/\bprimary\b/gi, 'main'],
      [/\bsufficient\b/gi, 'enough'],
      [/\bultimately\b/gi, 'in the end'],
    ];
    let out = text;
    for (const [pat, rep] of replacements) out = out.replace(pat, rep);
    return out;
  }

  // ── Pass 2: Add contractions ──
  function pass2_contractions(text) {
    const contractions = [
      [/\bdo not\b/g, "don't"],
      [/\bwill not\b/g, "won't"],
      [/\bcannot\b/g, "can't"],
      [/\bcan not\b/g, "can't"],
      [/\bI am\b/g, "I'm"],
      [/\bI have\b/g, "I've"],
      [/\bI will\b/g, "I'll"],
      [/\bit is\b/g, "it's"],
      [/\bthey are\b/g, "they're"],
      [/\bthey have\b/g, "they've"],
      [/\bwe are\b/g, "we're"],
      [/\bwe have\b/g, "we've"],
      [/\byou are\b/g, "you're"],
      [/\byou have\b/g, "you've"],
      [/\bhe is\b/g, "he's"],
      [/\bshe is\b/g, "she's"],
      [/\bthat is\b/g, "that's"],
      [/\bthere is\b/g, "there's"],
      [/\bwhat is\b/g, "what's"],
      [/\bis not\b/g, "isn't"],
      [/\bare not\b/g, "aren't"],
      [/\bwas not\b/g, "wasn't"],
      [/\bwere not\b/g, "weren't"],
      [/\bhas not\b/g, "hasn't"],
      [/\bhave not\b/g, "haven't"],
      [/\bhad not\b/g, "hadn't"],
      [/\bdoes not\b/g, "doesn't"],
      [/\bdid not\b/g, "didn't"],
      [/\bwould not\b/g, "wouldn't"],
      [/\bcould not\b/g, "couldn't"],
      [/\bshould not\b/g, "shouldn't"],
    ];
    let out = text;
    for (const [pat, rep] of contractions) out = out.replace(pat, rep);
    return out;
  }

  // ── Pass 3: Vary sentence rhythm & inject natural fillers ──
  function pass3_rhythm(text) {
    const fillers = [
      'honestly', 'basically', 'actually', 'you know', 'pretty much',
      'kind of', 'which is interesting', 'and that matters', 'right?',
      'it\'s worth saying', 'to be fair', 'and honestly'
    ];
    const openers = [
      'Look, ', 'So, ', 'Here\'s the thing — ', 'The thing is, ',
      'And really, ', 'Honestly, ', 'To be fair, '
    ];

    // Split into paragraphs
    const paras = text.split(/\n\n+/);
    const result = paras.map(para => {
      // Skip headings / short lines
      if (para.trim().length < 60 || /^#{1,4}\s/.test(para.trim())) return para;

      // Split paragraph into sentences
      let sentences = para.match(/[^.!?]+[.!?]+/g) || [para];

      sentences = sentences.map((s, i) => {
        let trimmed = s.trim();

        // Randomly insert a filler after comma or mid-sentence
        if (Math.random() < 0.25 && trimmed.length > 60) {
          const filler = fillers[Math.floor(Math.random() * fillers.length)];
          trimmed = trimmed.replace(/,\s+/, `, ${filler}, `);
        }

        // Occasionally prepend an opener to first sentence of paragraph
        if (i === 0 && Math.random() < 0.3 && !/^(So|Look|Here|The thing|And|Honestly|To be fair)/.test(trimmed)) {
          const opener = openers[Math.floor(Math.random() * openers.length)];
          trimmed = opener + trimmed.charAt(0).toLowerCase() + trimmed.slice(1);
        }

        // Break very long sentences (>45 words) at a conjunction
        const words = trimmed.split(' ');
        if (words.length > 45) {
          const mid = Math.floor(words.length / 2);
          const pivot = [' and ', ' but ', ' which ', ' so ', ' because '].find(c => trimmed.includes(c));
          if (pivot) {
            const idx = trimmed.indexOf(pivot, trimmed.length / 3);
            if (idx > 0) {
              return trimmed.slice(0, idx).trim() + '. ' + trimmed.slice(idx + pivot.length).trim();
            }
          }
        }

        return trimmed;
      });

      return sentences.join(' ');
    });

    return result.join('\n\n');
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function humanizeText() {
    const text = inputText.value.trim();
    if (!text) {
      showStatus(inputStatus, '✗ Paste some text first', 'error'); return;
    }

    convertBtn.disabled = true;
    convertBtn.classList.add('pulsing');
    outputText.value = '';
    document.getElementById('outCount').textContent = '0';
    hideStatus(inputStatus);
    hideStatus(outputStatus);

    try {
      setProgress(10, 'Pass 1 / 3 — Replacing AI phrases...');
      await sleep(400);
      const p1 = pass1_replacePhrases(text);

      setProgress(45, 'Pass 2 / 3 — Adding contractions...');
      await sleep(350);
      const p2 = pass2_contractions(p1);

      setProgress(80, 'Pass 3 / 3 — Adjusting rhythm & tone...');
      await sleep(400);
      const p3 = pass3_rhythm(p2);

      outputText.value = p3;
      document.getElementById('outCount').textContent = p3.length.toLocaleString();

      setProgress(100, 'Done!');
      setTimeout(hideProgress, 2000);
      showStatus(inputStatus,  '✓ 3-pass conversion complete!', 'success');
      showStatus(outputStatus, '✓ Ready to copy', 'success');

    } catch(err) {
      hideProgress();
      showStatus(inputStatus, `✗ ${err.message}`, 'error');
    } finally {
      convertBtn.disabled = false;
      convertBtn.classList.remove('pulsing');
    }
  }

  function copyText() {
    const text = outputText.value.trim();
    if (!text) { showStatus(outputStatus, '✗ Nothing to copy', 'error'); return; }
    navigator.clipboard.writeText(text)
      .then(() => { showStatus(outputStatus, '✓ Copied to clipboard!', 'success'); setTimeout(() => hideStatus(outputStatus), 2500); })
      .catch(()  => { showStatus(outputStatus, '✗ Copy failed — try selecting manually', 'error'); });
  }

  function clearInput()  { inputText.value  = ''; document.getElementById('inCount').textContent  = '0'; hideStatus(inputStatus); }
  function clearOutput() { outputText.value = ''; document.getElementById('outCount').textContent = '0'; hideStatus(outputStatus); }

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') humanizeText();
  });
</script>

</body>
</html>
